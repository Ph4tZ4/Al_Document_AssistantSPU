name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Make scripts executable
        run: |
          chmod +x installer/mac/build_dmg.sh
          chmod +x "installer/mac/Uninstall AI Document Assistant.command"

      - name: Build .app and .dmg
        run: bash installer/mac/build_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI_Document_Assistant_macOS
          path: dist_installer/AI_Document_Assistant_macOS.dmg
