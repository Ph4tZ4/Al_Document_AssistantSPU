name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name "AI_Document_Assistant"
          --add-data "web;web"
          --add-data "fonts;fonts"
          --collect-all webview
          app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI_Document_Assistant_Windows
          path: dist/AI_Document_Assistant.exe

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI_Document_Assistant_Windows_Installer
          path: dist_installer/AI_Document_Assistant_Setup.exe
